name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # Inject Apple cert into GITHUB_ENV only when the secret is actually set.
      # APPLE_CERTIFICATE must be absent (not just empty) — an empty env var still
      # satisfies Rust's env::var() Ok(), causing Tauri to call `security import`
      # with an invalid cert. The secrets context is read via env: (allowed there).
      # Inject Apple env vars only when secrets are actually set.
      # Any Apple var set to empty string (even APPLE_TEAM_ID="") causes Tauri
      # to attempt signing/notarization and then fail on validation.
      - name: Set Apple signing env (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          _CERT: ${{ secrets.APPLE_CERTIFICATE }}
          _CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PWD: ${{ secrets.APPLE_PASSWORD }}
          _TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$_CERT" ]       && echo "APPLE_CERTIFICATE=$_CERT"                   >> $GITHUB_ENV || true
          [ -n "$_CERT_PWD" ]   && echo "APPLE_CERTIFICATE_PASSWORD=$_CERT_PWD"      >> $GITHUB_ENV || true
          [ -n "$_IDENTITY" ]   && echo "APPLE_SIGNING_IDENTITY=$_IDENTITY"          >> $GITHUB_ENV || true
          [ -n "$_APPLE_ID" ]   && echo "APPLE_ID=$_APPLE_ID"                        >> $GITHUB_ENV || true
          [ -n "$_APPLE_PWD" ]  && echo "APPLE_PASSWORD=$_APPLE_PWD"                 >> $GITHUB_ENV || true
          [ -n "$_TEAM_ID" ]    && echo "APPLE_TEAM_ID=$_TEAM_ID"                    >> $GITHUB_ENV || true

      # Download FFmpeg binaries before building
      - name: Download FFmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          FFMPEG_TARGET: ${{ matrix.target }}
        run: bash scripts/download-ffmpeg.sh

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/download-ffmpeg.ps1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing vars are injected via GITHUB_ENV in the step above,
          # only when the secrets are actually configured. Do NOT set them here —
          # even an empty string triggers Tauri's signing/notarization pipeline.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AudioConvert ${{ github.ref_name }}"
          releaseBody: |
            ## AudioConvert ${{ github.ref_name }}

            本地音频格式转换工具 — 完全离线，支持 30+ 格式，FFmpeg 已内置。

            ### 下载安装
            | 系统 | 文件 |
            |------|------|
            | macOS (Apple Silicon M1/M2/M3/M4) | `AudioConvert_*_aarch64.dmg` |
            | macOS (Intel) | `AudioConvert_*_x64.dmg` |
            | Windows | `AudioConvert_*_x64-setup.exe` |

            - **macOS**：打开 `.dmg`，将 AudioConvert 拖入应用程序文件夹
            - **Windows**：运行 `.exe` 安装向导
            - **无需额外配置**，FFmpeg 已内置，开箱即用
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
